name: Build Telegram Android App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  TELEGRAM_APP_ID: ${{ secrets.TELEGRAM_APP_ID }}
  TELEGRAM_APP_HASH: ${{ secrets.TELEGRAM_APP_HASH }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout$v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager "ndk;21.4.7075529" "cmake;3.10.2.4988404" "build-tools;35.0.0" "platforms;android-35"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~~.gradle/caches
          ~~.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Create local.properties
      run: |
        echo "sdk.ir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> local.properties
        echo "RELEASE_KEY_PASSWORD=android" >> local.properties
        echo "RELEASE_KEY_ALIAS=androidreleasekey" >> local.properties
        echo "RELEASE_STORE_PASSWORD=android" >> local.properties

    - name: Build with Gradle
      run: |
        ./gradlew :TMessagesProj:assembleHA_private --no-daemon --stacktrace
      env:
        TELEGRAM_APP_ID: ${{ secrets.TELEGRAM_APP_ID }}
        TELEGRAM_APP_HASH: ${{ secrets.TELEGRAM_APP_HASH }}
      timeout-minutes: 180

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: telegram-apk
        path: TMessagesProj/build/outputs/apk/*/release/*.apk
        if-no-files-found: warn

    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: TMessagesProj/build/outputs/logs/
        if-no-files-found: ignore
